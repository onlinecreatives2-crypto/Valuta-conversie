<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Valuta" />
  <title>Valuta Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4a853;
      --gold-dim: rgba(212,168,83,0.18);
      --gold-glow: rgba(212,168,83,0.07);
      --cream: #f5f0e8;
      --muted: #6b7280;
      --card-bg: rgba(255,255,255,0.025);
      --input-bg: rgba(255,255,255,0.06);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(212,168,83,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(20,10,50,0.8) 0%, transparent 60%);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 36px 16px 40px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 22px;
    }
    .header-label {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-family: 'Inter', sans-serif;
      opacity: 0.8;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.5px;
      color: var(--cream);
      line-height: 1;
      opacity: 0.9;
    }
    .header-line {
      width: 28px;
      height: 1px;
      background: var(--gold);
      margin: 8px auto 0;
      opacity: 0.6;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      border: 1px solid var(--gold-dim);
      border-radius: 24px;
      padding: 24px 20px 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
    }

    /* ── Status ── */
    .status {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.8px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 18px;
    }
    .status.live    { color: #4ade80; }
    .status.loading { color: var(--muted); }
    .status.offline { color: #f97316; }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--gold);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.2s, transform 0.3s;
    }
    .refresh-btn:hover { opacity: 0.7; transform: rotate(90deg); }
    .refresh-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Field label ── */
    .field-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 7px;
      display: block;
      opacity: 0.85;
    }

    /* ── Amount input ── */
    .amount-wrap { margin-bottom: 16px; }
    .amount-input-row {
      position: relative;
      display: flex;
      align-items: center;
    }
    .amount-symbol {
      position: absolute;
      left: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 300;
      color: var(--gold);
      pointer-events: none;
      line-height: 1;
      letter-spacing: -1px;
      opacity: 0.85;
    }
    .amount-input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid rgba(212,168,83,0.28);
      border-radius: 12px;
      padding: 14px 16px 14px 40px;
      font-size: 44px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      letter-spacing: -1px;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      line-height: 1;
    }
    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .amount-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.1);
    }

    /* ── Quick buttons ── */
    .quick-btns {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: nowrap;
    }
    .quick-btn {
      flex: 1;
      min-width: 0;
      height: 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,168,83,0.15);
      border-radius: 10px;
      padding: 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn:hover  { border-color: rgba(212,168,83,0.4); color: var(--cream); }
    .quick-btn.active {
      background: rgba(212,168,83,0.18);
      border-color: rgba(212,168,83,0.7);
      color: var(--gold);
      font-weight: 600;
      box-shadow: 0 0 10px rgba(212,168,83,0.12);
    }

    /* ── Currency selects ── */
    .select-wrap { position: relative; margin-bottom: 12px; }
    .select-flag {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      pointer-events: none;
      z-index: 1;
    }
    .select-chevron {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--gold);
      font-size: 12px;
      opacity: 0.6;
    }
    .currency-select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(212,168,83,0.28);
      border-radius: 12px;
      padding: 14px 40px 14px 50px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--cream);
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .currency-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.1);
    }
    .currency-select:active { background: rgba(255,255,255,0.08); }

    /* ── Swap button ── */
    .swap-wrap {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }
    .swap-btn {
      background: linear-gradient(135deg, rgba(212,168,83,0.15), rgba(212,168,83,0.06));
      border: 1px solid rgba(212,168,83,0.4);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      color: var(--gold);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 0 16px rgba(212,168,83,0.1);
    }
    .swap-btn:hover {
      background: linear-gradient(135deg, rgba(212,168,83,0.28), rgba(212,168,83,0.12));
      box-shadow: 0 0 24px rgba(212,168,83,0.22);
      transform: rotate(180deg);
    }
    .swap-btn:active { transform: rotate(180deg) scale(0.93); }

    /* ── Result box ── */
    .result-box {
      background: var(--gold-glow);
      border: 1px solid rgba(212,168,83,0.18);
      border-radius: 16px;
      padding: 24px 16px 20px;
      text-align: center;
      margin-top: 16px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.25s;
    }
    .result-box.fading { opacity: 0; }
    .result-from {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .result-equation {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: rgba(212,168,83,0.55);
      margin-bottom: 2px;
      letter-spacing: 0.5px;
    }
    .result-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: -1.5px;
      line-height: 1.05;
    }
    .result-name {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }
    .result-updated {
      font-size: 10px;
      color: rgba(107,114,128,0.7);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .result-placeholder {
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Rate line ── */
    .rate-line {
      text-align: center;
      font-size: 10px;
      color: #374151;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }

    /* ── Offline banner ── */
    .offline-banner {
      background: rgba(249,115,22,0.08);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 11px;
      color: #f97316;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }
    .offline-banner.visible { display: block; }

    /* ── Footer ── */
    .footer {
      margin-top: 18px;
      font-size: 10px;
      color: #1f2937;
      letter-spacing: 1px;
      text-align: center;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }

    /* ── Fade-in for result ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-box { animation: fadeUp 0.3s ease; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-label">Wisselkoers</div>
    <div class="header-title">Valuta</div>
    <div class="header-line"></div>
  </div>

  <div class="card">
    <div class="status loading" id="status">
      <span class="spinning">⏳</span> Live koersen ophalen...
    </div>

    <div class="offline-banner" id="offlineBanner">
      ⚠ Geen internet — laatste opgeslagen koersen worden gebruikt
    </div>

    <!-- Amount -->
    <div class="amount-wrap">
      <label class="field-label">Bedrag</label>
      <div class="amount-input-row">
        <span class="amount-symbol" id="amountSymbol">$</span>
        <input class="amount-input" type="number" id="amountInput" value="1" min="0" inputmode="decimal" />
      </div>
      <div class="quick-btns" id="quickBtns">
        <button class="quick-btn active" data-val="1">1</button>
        <button class="quick-btn" data-val="5">5</button>
        <button class="quick-btn" data-val="10">10</button>
        <button class="quick-btn" data-val="25">25</button>
        <button class="quick-btn" data-val="50">50</button>
        <button class="quick-btn" data-val="100">100</button>
      </div>
    </div>

    <!-- From -->
    <label class="field-label">Van</label>
    <div class="select-wrap">
      <div class="select-flag" id="fromFlag">🇺🇸</div>
      <div class="select-chevron">›</div>
      <select class="currency-select" id="fromSelect"></select>
    </div>

    <!-- Swap -->
    <div class="swap-wrap">
      <button class="swap-btn" id="swapBtn" title="Wissel valuta">⇅</button>
    </div>

    <!-- To -->
    <label class="field-label">Naar</label>
    <div class="select-wrap">
      <div class="select-flag" id="toFlag">🇪🇺</div>
      <div class="select-chevron">›</div>
      <select class="currency-select" id="toSelect"></select>
    </div>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <div class="result-placeholder">Koersen worden geladen...</div>
    </div>

    <div class="rate-line" id="rateLine"></div>
  </div>

  <div class="footer">Live koersen via Frankfurter · ECB data</div>

<script>
const currencies = [
  { code: "USD", name: "US Dollar",           symbol: "$",    flag: "🇺🇸" },
  { code: "EUR", name: "Euro",                symbol: "€",    flag: "🇪🇺" },
  { code: "GBP", name: "Brits Pond",          symbol: "£",    flag: "🇬🇧" },
  { code: "JPY", name: "Japanse Yen",         symbol: "¥",    flag: "🇯🇵" },
  { code: "CAD", name: "Canadese Dollar",     symbol: "$",    flag: "🇨🇦" },
  { code: "AUD", name: "Australische Dollar", symbol: "$",    flag: "🇦🇺" },
  { code: "CHF", name: "Zwitserse Frank",     symbol: "Fr",   flag: "🇨🇭" },
  { code: "CNY", name: "Chinese Yuan",        symbol: "¥",    flag: "🇨🇳" },
  { code: "INR", name: "Indiase Roepie",      symbol: "₹",    flag: "🇮🇳" },
  { code: "MXN", name: "Mexicaanse Peso",     symbol: "$",    flag: "🇲🇽" },
  { code: "BRL", name: "Braziliaanse Real",   symbol: "R$",   flag: "🇧🇷" },
  { code: "KRW", name: "Zuid-Koreaanse Won",  symbol: "₩",    flag: "🇰🇷" },
  { code: "SGD", name: "Singaporese Dollar",  symbol: "$",    flag: "🇸🇬" },
  { code: "AED", name: "VAE Dirham",          symbol: "د.إ",  flag: "🇦🇪" },
  { code: "ZAR", name: "Zuid-Afrikaanse Rand",symbol: "R",    flag: "🇿🇦" },
];

// Cache duration: 8 hours in milliseconds
const CACHE_TTL = 8 * 60 * 60 * 1000;
const CACHE_PREFIX = "valuta_pair_v2_";

let rates = null;       // { [code]: rate relative to fromCode }
let fromCode = "USD";
let toCode = "EUR";
let amount = 1;
let isLoading = true;

// --- DOM refs ---
const statusEl    = document.getElementById("status");
const offlineBanner = document.getElementById("offlineBanner");
const amountInput = document.getElementById("amountInput");
const fromSelect  = document.getElementById("fromSelect");
const toSelect    = document.getElementById("toSelect");
const fromFlag    = document.getElementById("fromFlag");
const toFlag      = document.getElementById("toFlag");
const swapBtn     = document.getElementById("swapBtn");
const resultBox   = document.getElementById("resultBox");
const rateLine    = document.getElementById("rateLine");
const quickBtns   = document.querySelectorAll(".quick-btn");
const amountSymbol = document.getElementById("amountSymbol");

function updateAmountSymbol() {
  const sym = currencies.find(c => c.code === fromCode)?.symbol || "";
  amountSymbol.textContent = sym;
  // Adjust left padding based on symbol width
  const symWidth = amountSymbol.offsetWidth;
  amountInput.style.paddingLeft = (symWidth + 20) + "px";
}

// --- Cache helpers ---
function cacheKey(from, to) {
  return CACHE_PREFIX + from + "_" + to;
}

function getCached(from, to) {
  try {
    const raw = localStorage.getItem(cacheKey(from, to));
    if (!raw) return null;
    const { rate, timestamp } = JSON.parse(raw);
    if (Date.now() - timestamp > CACHE_TTL) return null; // expired
    return rate;
  } catch { return null; }
}

function setCache(from, to, rate) {
  try {
    localStorage.setItem(cacheKey(from, to), JSON.stringify({ rate, timestamp: Date.now() }));
  } catch {}
}

function getLastCached(from, to) {
  // Return stale cache (ignoring TTL) for offline fallback
  try {
    const raw = localStorage.getItem(cacheKey(from, to));
    if (!raw) return null;
    const { rate, timestamp } = JSON.parse(raw);
    return { rate, timestamp };
  } catch { return null; }
}

// --- Populate selects ---
function buildSelects() {
  [fromSelect, toSelect].forEach(sel => {
    sel.innerHTML = currencies.map(c =>
      `<option value="${c.code}">${c.code} — ${c.name}</option>`
    ).join("");
  });
  fromSelect.value = fromCode;
  toSelect.value = toCode;
}

// --- Quick buttons ---
function updateQuickBtns() {
  const sym = currencies.find(c => c.code === fromCode)?.symbol || "";
  quickBtns.forEach(btn => {
    const val = btn.dataset.val;
    btn.textContent = sym + val;
    btn.classList.toggle("active", parseFloat(amountInput.value) === parseFloat(val));
  });
}

quickBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    amountInput.value = btn.dataset.val;
    amount = parseFloat(btn.dataset.val);
    updateQuickBtns();
    updateResult();
  });
});

// --- Convert & render result ---
function updateResult() {
  const num = parseFloat(amountInput.value);
  const from = currencies.find(c => c.code === fromCode);
  const to   = currencies.find(c => c.code === toCode);

  if (isLoading) {
    resultBox.innerHTML = `<div class="result-placeholder">Koersen worden geladen...</div>`;
    rateLine.textContent = "";
    return;
  }

  if (rates === null || isNaN(num) || num < 0 || amountInput.value === "") {
    resultBox.innerHTML = `<div class="result-placeholder">Voer een bedrag in</div>`;
    rateLine.textContent = "";
    return;
  }

  const result = num * rates;
  const now = new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
  // Trigger fade animation
  resultBox.classList.add("fading");
  setTimeout(() => {
    resultBox.innerHTML = `
      <div class="result-equation">${from.symbol}${num} =</div>
      <div class="result-amount">${to.symbol}${result.toLocaleString("nl-NL", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
      <div class="result-name">${to.name}</div>
      <div class="result-updated">Koers om ${now}</div>
    `;
    resultBox.classList.remove("fading");
  }, 120);
  rateLine.textContent = `1 ${fromCode} = ${rates.toLocaleString("nl-NL", { minimumFractionDigits: 4, maximumFractionDigits: 4 })} ${toCode}`;
}

// --- Status UI ---
function setStatus(type, text, showRefresh = false) {
  statusEl.className = `status ${type}`;
  statusEl.innerHTML = text + (showRefresh
    ? ` <button class="refresh-btn" id="refreshBtn" title="Ververs koersen">↻</button>`
    : "");
  if (showRefresh) {
    document.getElementById("refreshBtn").addEventListener("click", () => fetchRates(true));
  }
}

// --- Fetch rate — tries 3 sources in order ---
async function fetchRates(forceRefresh = false) {
  // 1. Valid cache (skip if forceRefresh)
  if (!forceRefresh) {
    const cached = getCached(fromCode, toCode);
    if (cached !== null) {
      rates = cached;
      isLoading = false;
      offlineBanner.classList.remove("visible");
      const now = new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
      setStatus("live", `● Cache · ${now}`, true);
      updateResult();
      return;
    }
  }

  isLoading = true;
  setStatus("loading", `<span class="spinning">⏳</span> Koersen ophalen...`);
  updateResult();

  const from = fromCode.toLowerCase();
  const to   = toCode.toLowerCase();

  // Three API sources to try in order
  const sources = [
    // 1. New Frankfurter.dev (v2 API)
    async () => {
      const res = await fetch(`https://api.frankfurter.dev/v2/rate/${fromCode}/${toCode}`);
      if (!res.ok) throw new Error(`frankfurter.dev ${res.status}`);
      const d = await res.json();
      if (!d.rate) throw new Error("no rate");
      return d.rate;
    },
    // 2. GitHub fawazahmed0 exchange-api (no CORS, no key, no limit)
    async () => {
      const res = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${from}.json`);
      if (!res.ok) throw new Error(`jsdelivr ${res.status}`);
      const d = await res.json();
      const rate = d[from]?.[to];
      if (!rate) throw new Error("no rate");
      return rate;
    },
    // 3. Fallback mirror of fawazahmed0
    async () => {
      const res = await fetch(`https://latest.currency-api.pages.dev/v1/currencies/${from}.json`);
      if (!res.ok) throw new Error(`pages.dev ${res.status}`);
      const d = await res.json();
      const rate = d[from]?.[to];
      if (!rate) throw new Error("no rate");
      return rate;
    }
  ];

  let rate = null;
  let lastErr = null;

  for (const source of sources) {
    try {
      rate = await source();
      break;
    } catch (e) {
      lastErr = e;
    }
  }

  if (rate !== null) {
    rates = rate;
    setCache(fromCode, toCode, rate);
    isLoading = false;
    offlineBanner.classList.remove("visible");
    const now = new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
    setStatus("live", `● Live · bijgewerkt om ${now}`, true);
  } else {
    // All sources failed — try stale cache
    const stale = getLastCached(fromCode, toCode);
    if (stale) {
      rates = stale.rate;
      const dateStr = new Date(stale.timestamp).toLocaleString("nl-NL", {
        day: "numeric", month: "short", hour: "2-digit", minute: "2-digit"
      });
      isLoading = false;
      offlineBanner.classList.add("visible");
      setStatus("offline", `⚠ Opgeslagen koers van ${dateStr}`, true);
    } else {
      rates = null;
      isLoading = false;
      setStatus("offline", `⚠ Geen internet — geen koers beschikbaar`, true);
    }
  }

  updateResult();
}

// --- Event listeners ---
amountInput.addEventListener("input", () => {
  amount = parseFloat(amountInput.value);
  updateQuickBtns();
  updateResult();
});

fromSelect.addEventListener("change", () => {
  fromCode = fromSelect.value;
  fromFlag.textContent = currencies.find(c => c.code === fromCode)?.flag || "";
  updateAmountSymbol();
  updateQuickBtns();
  fetchRates();
});

toSelect.addEventListener("change", () => {
  toCode = toSelect.value;
  toFlag.textContent = currencies.find(c => c.code === toCode)?.flag || "";
  fetchRates();
});

swapBtn.addEventListener("click", () => {
  [fromCode, toCode] = [toCode, fromCode];
  fromSelect.value = fromCode;
  toSelect.value   = toCode;
  fromFlag.textContent = currencies.find(c => c.code === fromCode)?.flag || "";
  toFlag.textContent   = currencies.find(c => c.code === toCode)?.flag   || "";
  updateAmountSymbol();
  updateQuickBtns();
  fetchRates();
});

// --- Init ---
buildSelects();
updateAmountSymbol();
updateQuickBtns();
fetchRates();
// Recalculate padding after fonts load
window.addEventListener("load", updateAmountSymbol);
</script>
</body>
</html>
